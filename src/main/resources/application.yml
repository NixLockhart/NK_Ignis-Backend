server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/volunteer_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.nkignis: debug
  file:
    name: logs/app.log

jwt:
  secret: nk-ignis-volunteer-jwt-secret-2026
  expiration: 604800000

ai:
  enable: false
  enable-description: false
  enable-checkin: false
  enable-recommendation: false

dify:
  api-url: http://localhost/v1
  api-key: your-dify-api-key
